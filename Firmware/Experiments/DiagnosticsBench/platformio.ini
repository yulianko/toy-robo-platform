; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_mode = qio
framework = espidf
upload_protocol = esptool
monitor_speed = 115200

check_tool = clangtidy
check_skip_packages = yes

build_flags =
    -D CONFIG_FREERTOS_USE_TRACE_FACILITY=1
    -D INCLUDE_uxTaskGetSystemState=1
    -D CONFIG_FREERTOS_RUN_TIME_STATS=1
    -D CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS=1
    -D CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1

lib_extra_dirs =
    ../../SharedComponents/Drivers
    ../../SharedComponents/Tasks
    ../../SharedComponents/Messages
    ../../SharedComponents/Services
    ../../SharedComponents/Net
    ../../SharedComponents/Data
    ../../SharedComponents/Log
